<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Culata Jovái Arquitectos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html, body {
            font-family: 'Futura', 'Century Gothic', sans-serif;
            background-color: #FFFFFF;
            overflow-x: hidden;
            overflow-y: hidden;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER MINIMALISTA */
        .landing-header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 60px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #FFFFFF;
        }

        .hero-zone {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding-top: 10px;
            padding-bottom: 12px;
        }

        .logo-text {
            cursor: pointer;
            height: 35px;
            display: flex;
            align-items: center;
        }

        .logo-text img {
            height: 100%;
            width: auto;
            transition: opacity 0.3s ease;
        }

        .logo-text:hover img {
            opacity: 0.7;
        }

        .nav-link {
            font-size: 10px;
            letter-spacing: 2px;
            color: #000000;
            text-decoration: none;
            text-transform: lowercase;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #DC143C;
        }

        /* CAROUSEL */
        .carousel-container {
            width: 95vw;
            flex: 1;
            min-height: 0;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .carousel-slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center bottom;
            cursor: default;
        }

        .bottom-controls {
            width: 95vw;
            margin: 8px auto 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        /* SELECTOR DE IDIOMA */
        .language-selector {
            display: flex;
            gap: 10px;
        }

        /* BOTONES DE REDES SOCIALES */
        .social-buttons {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #000000;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .social-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .social-btn svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .lang-option {
            font-size: 10px;
            letter-spacing: 1px;
            color: #999999;
            text-decoration: none;
            text-transform: lowercase;
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .lang-option:hover {
            color: #000000;
        }

        .lang-option.active {
            color: #000000;
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .landing-header {
                padding: 20px 30px;
            }

            .logo-text {
                height: 28px;
            }

            .nav-link {
                font-size: 8px;
            }

            .carousel-container {
                width: 98vw;
            }

            .hero-zone {
                padding-top: 8px;
                padding-bottom: 10px;
            }

            .bottom-controls {
                width: 98vw;
                margin-top: 6px;
            }

            .language-selector {
                gap: 8px;
            }

            .lang-option {
                font-size: 9px;
            }

            .social-buttons {
                gap: 10px;
            }

            .social-btn {
                width: 16px;
                height: 16px;
            }
        }

        @media (max-width: 480px) {
            .landing-header {
                padding: 15px 20px;
            }

            .logo-text {
                height: 24px;
            }

            .carousel-container {
                width: 100vw;
            }

            .bottom-controls {
                width: 100vw;
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="landing-header">
        <nav style="display: flex; gap: 30px;">
            <a href="trabajos.html" class="nav-link" data-i18n="nav-trabajos">trabajos</a>
            <a href="nosotros.html" class="nav-link" data-i18n="nav-sobre">sobre</a>
            <a href="contacto.html" class="nav-link" data-i18n="nav-contacto">contacto</a>
        </nav>
        <div class="logo-text" onclick="window.location.href='index.html'">
            <img src="images/logo.png" alt="Grupo Culata Jovái Arquitectos">
        </div>
    </header>

    <div class="hero-zone">
        <!-- CAROUSEL -->
        <div class="carousel-container" id="carouselContainer">
            <!-- Slides se generarán dinámicamente -->
        </div>

        <div class="bottom-controls">
            <!-- BOTONES DE REDES SOCIALES -->
            <div class="social-buttons">
                <a href="https://www.facebook.com" target="_blank" class="social-btn" aria-label="Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </a>
                <a href="https://www.instagram.com" target="_blank" class="social-btn" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                    </svg>
                </a>
            </div>

            <!-- SELECTOR DE IDIOMA -->
            <div class="language-selector">
                <span class="lang-option active" data-lang="es" onclick="changeLanguage('es')">es</span>
                <span class="lang-option" data-lang="en" onclick="changeLanguage('en')">en</span>
                <span class="lang-option" data-lang="de" onclick="changeLanguage('de')">de</span>
            </div>
        </div>
    </div>

    <script src="dropbox-config.js"></script>
    <script src="dropbox-service-vercel.js"></script>
    <script>
        // Sistema de traducción
        const translations = {
            es: {
                'nav-trabajos': 'trabajos',
                'nav-sobre': 'sobre',
                'nav-contacto': 'contacto'
            },
            en: {
                'nav-trabajos': 'works',
                'nav-sobre': 'about',
                'nav-contacto': 'contact'
            },
            de: {
                'nav-trabajos': 'arbeiten',
                'nav-sobre': 'über',
                'nav-contacto': 'kontakt'
            }
        };

        // Función para cambiar idioma
        function changeLanguage(lang) {
            // Guardar idioma seleccionado en localStorage
            localStorage.setItem('selectedLanguage', lang);
            
            // Actualizar UI
            updateLanguageUI(lang);
            
            // Aplicar traducciones
            applyTranslations(lang);
        }

        // Actualizar indicador visual del idioma seleccionado
        function updateLanguageUI(lang) {
            document.querySelectorAll('.lang-option').forEach(option => {
                option.classList.remove('active');
                if (option.dataset.lang === lang) {
                    option.classList.add('active');
                }
            });
        }

        // Aplicar traducciones a todos los elementos con data-i18n
        function applyTranslations(lang) {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.dataset.i18n;
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
        }

        // Inicializar idioma al cargar la página
        function initLanguage() {
            const savedLang = localStorage.getItem('selectedLanguage') || 'es';
            updateLanguageUI(savedLang);
            applyTranslations(savedLang);
        }

        // Obtener portadas de los proyectos desde Dropbox
        async function getCarouselImages() {
            try {
                const projects = await dropboxService.getAllProjectsWithCovers();

                return projects.map(project => ({
                    cover: project.cover,
                    title: project.name,
                    path: project.path
                }));
            } catch (error) {
                console.error('Error cargando proyectos:', error);
                return [];
            }
        }

        // Crear slides del carousel
        async function createCarousel() {
            const projects = await getCarouselImages();
            const container = document.getElementById('carouselContainer');

            if (projects.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 100px; color: #999;">No hay proyectos disponibles</p>';
                return;
            }

            projects.forEach((project, index) => {
                // Crear slide con enlace al proyecto
                const slide = document.createElement('div');
                slide.className = 'carousel-slide' + (index === 0 ? ' active' : '');
                slide.style.cursor = 'pointer';
                slide.onclick = () => window.location.href = `proyecto.html?path=${encodeURIComponent(project.path)}`;
                slide.innerHTML = `
                    ${project.cover
                        ? `<img src="${project.cover}" alt="${project.title}">`
                        : `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#999;letter-spacing:1px;">Sin portada</div>`
                    }
                `;
                
                container.appendChild(slide);
            });
        }

        let currentSlide = 0;

        function showSlide(index) {
            // Eliminar active de todos
            document.querySelectorAll('.carousel-slide').forEach(slide => {
                slide.classList.remove('active');
            });

            // Añadir active al actual
            const slides = document.querySelectorAll('.carousel-slide');
            
            if (slides[index]) slides[index].classList.add('active');
        }

        function nextSlide() {
            const totalSlides = document.querySelectorAll('.carousel-slide').length;
            currentSlide = (currentSlide + 1) % totalSlides;
            showSlide(currentSlide);
        }

        function prevSlide() {
            const totalSlides = document.querySelectorAll('.carousel-slide').length;
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            showSlide(currentSlide);
        }

        function goToSlide(index) {
            currentSlide = index;
            showSlide(currentSlide);
        }

        // Event listeners
        // Navegación con teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Auto-avance cada 5 segundos
        let autoSlide = setInterval(nextSlide, 5000);

        // Pausar auto-avance al hover
        document.getElementById('carouselContainer').addEventListener('mouseenter', () => {
            clearInterval(autoSlide);
        });

        document.getElementById('carouselContainer').addEventListener('mouseleave', () => {
            autoSlide = setInterval(nextSlide, 5000);
        });

        // Inicializar carousel
        createCarousel();

        // Inicializar idioma
        initLanguage();
    </script>
</body>
</html>
