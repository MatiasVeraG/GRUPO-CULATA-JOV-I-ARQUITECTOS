<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto - Grupo Culata Jovai Arquitectos</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .landing-header { position: fixed; top: 0; left: 0; right: 0; padding: 30px 60px; z-index: 100; display: flex; justify-content: space-between; align-items: center; background-color: #fff; }
        .logo-text { cursor: pointer; height: 35px; display: flex; align-items: center; }
        .logo-text img { height: 100%; width: auto; }
        .nav-link { font-size: 10px; letter-spacing: 2px; color: #000; text-decoration: none; text-transform: lowercase; }
        .nav-link:hover { color: #DC143C; }

        .project-page { margin-top: 100px; }
        .loading { text-align: center; padding: 120px 20px; letter-spacing: 2px; color: #777; }

        .project-slideshow, .planos-slideshow { width: 100%; position: relative; overflow: hidden; background: #fff; }
        .slideshow-track, .planos-track { display: flex; transition: transform 0.5s ease; }
        .slideshow-slide, .planos-slide { min-width: 100%; display: flex; align-items: center; justify-content: center; }
        .slideshow-slide img { width: 100%; height: 88vh; object-fit: contain; cursor: zoom-in; }
        .planos-slide img { width: 100%; height: 78vh; object-fit: contain; cursor: zoom-in; }

        .slideshow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: #000; font-size: 46px; cursor: pointer; padding: 10px 20px; }
        .slideshow-prev { left: 0; }
        .slideshow-next { right: 0; }
        .slideshow-counter { position: absolute; bottom: 20px; right: 30px; color: rgba(0,0,0,0.5); font-size: 11px; letter-spacing: 2px; }

        .project-info { display: flex; max-width: 1400px; margin: 0 auto; padding: 60px 80px; }
        .project-sidebar { flex: 0 0 33.333%; max-width: 33.333%; padding-right: 55px; border-right: 1px solid #eee; }
        .project-description-wrap { flex: 0 0 66.666%; max-width: 66.666%; padding-left: 55px; }
        .project-title { font-size: 26px; font-weight: 300; letter-spacing: 3px; margin-bottom: 35px; text-transform: uppercase; }
        .project-datos-item { margin-bottom: 14px; }
        .project-datos-label { display: block; color: #999; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .project-datos-value { color: #000; font-size: 11px; letter-spacing: 1px; }
        .project-description { font-size: 13px; line-height: 1.9; color: #333; text-align: justify; }
        .project-description p { margin-bottom: 20px; }

        .planos-title { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #999; padding: 40px 80px 24px; border-top: 1px solid #eee; }

        .back-wrap { padding: 20px 80px 10px; }
        .back-button { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 2px; color: #000; text-decoration: none; text-transform: lowercase; }

        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox-content img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
        .lightbox-close, .lightbox-nav { position: absolute; color: #fff; cursor: pointer; user-select: none; }
        .lightbox-close { top: 20px; right: 30px; font-size: 40px; }
        .lightbox-nav { top: 50%; transform: translateY(-50%); font-size: 50px; padding: 20px; }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-counter { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 12px; letter-spacing: 2px; }

        .language-selector { position: fixed; bottom: 30px; right: 30px; z-index: 200; display: flex; gap: 10px; }
        .lang-option { font-size: 10px; letter-spacing: 1px; color: #999; cursor: pointer; text-transform: lowercase; }
        .lang-option.active { color: #000; text-decoration: underline; }

        @media (max-width: 900px) {
            .landing-header { padding: 20px 25px; }
            .project-info { display: block; padding: 40px 24px; }
            .project-sidebar { max-width: none; border-right: none; padding-right: 0; margin-bottom: 24px; }
            .project-description-wrap { max-width: none; padding-left: 0; }
            .slideshow-slide img, .planos-slide img { height: 60vh; }
            .back-wrap, .planos-title { padding-left: 24px; padding-right: 24px; }
        }
    </style>
</head>
<body>
    <header class="landing-header">
        <nav style="display: flex; gap: 30px;">
            <a href="trabajos.html" class="nav-link" data-i18n="nav-trabajos">trabajos</a>
            <a href="nosotros.html" class="nav-link" data-i18n="nav-sobre">sobre</a>
            <a href="contacto.html" class="nav-link" data-i18n="nav-contacto">contacto</a>
        </nav>
        <div class="logo-text" onclick="window.location.href='index.html'">
            <img src="images/logo.png" alt="Grupo Culata Jovai Arquitectos">
        </div>
    </header>

    <main class="project-page" id="projectContent">
        <div class="loading">Cargando proyecto...</div>
    </main>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">&#8249;</span>
        <div class="lightbox-content"><img id="lightboxImage" src="" alt=""></div>
        <span class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">&#8250;</span>
        <span class="lightbox-counter" id="lightboxCounter"></span>
    </div>

    <footer style="background-color:#000;color:#fff;text-align:center;padding:40px 20px;font-size:10px;letter-spacing:2px;margin-top:80px;">
        <p>© 2026 GRUPO CULATA JOVAI ARQUITECTOS</p>
    </footer>

    <div class="language-selector">
        <span class="lang-option active" data-lang="es" onclick="changeLanguage('es')">es</span>
        <span class="lang-option" data-lang="en" onclick="changeLanguage('en')">en</span>
        <span class="lang-option" data-lang="de" onclick="changeLanguage('de')">de</span>
    </div>

    <script src="dropbox-config.js"></script>
    <script src="dropbox-service-vercel.js"></script>
    <script>
        let currentProject = null;
        let allImages = [];
        let currentImageIndex = 0;
        let slideshowIndex = 0;
        let planosIndex = 0;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function getPathFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const path = params.get('path');
            return path ? decodeURIComponent(path) : null;
        }

        async function resolveProjectPath() {
            const directPath = getPathFromUrl();
            if (directPath) return directPath;

            const params = new URLSearchParams(window.location.search);
            const slug = params.get('proyecto') || params.get('slug');
            if (!slug) return null;
            const projects = await dropboxService.listProjects();
            const found = projects.find(p => p.slug === slug);
            return found ? found.path : null;
        }

        async function loadProjectData() {
            try {
                const projectPath = await resolveProjectPath();
                if (!projectPath) {
                    document.getElementById('projectContent').innerHTML = '<div class="loading">Proyecto no encontrado</div>';
                    return;
                }

                currentProject = await dropboxService.getProjectDetail(projectPath);
                renderProject();
                document.title = `${currentProject.name} - Grupo Culata Jovai Arquitectos`;
            } catch (error) {
                console.error(error);
                document.getElementById('projectContent').innerHTML = `<div class="loading">Error al cargar el proyecto: ${escapeHtml(error.message)}</div>`;
            }
        }

        function renderProject() {
            const content = document.getElementById('projectContent');
            const images = currentProject.images || [];
            const drawings = currentProject.drawings || [];

            allImages = [
                ...images.map(i => i.temporaryLink),
                ...drawings.map(d => d.temporaryLink)
            ];

            const datosHTML = (currentProject.features || []).map(item => {
                return `<div class="project-datos-item"><span class="project-datos-label">${escapeHtml(item.key)}</span><span class="project-datos-value">${escapeHtml(item.value || '')}</span></div>`;
            }).join('');

            const descriptionText = (currentProject.description || '').trim();
            const descriptionHTML = descriptionText
                ? descriptionText.split(/\n\s*\n/).map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('')
                : '<p>Sin descripcion disponible.</p>';

            const slidesHTML = images.length
                ? images.map((img, index) => `<div class="slideshow-slide"><img src="${img.temporaryLink}" alt="${escapeHtml(currentProject.name)}" loading="${index === 0 ? 'eager' : 'lazy'}" onclick="openLightbox(${index})"></div>`).join('')
                : '<div class="slideshow-slide"><div style="height:88vh;display:flex;align-items:center;justify-content:center;color:#999;letter-spacing:1px;">Sin imagenes</div></div>';

            let drawingsHTML = '';
            if (drawings.length) {
                drawingsHTML = `
                    <h3 class="planos-title">Dibujos</h3>
                    <div class="planos-slideshow">
                        <div class="planos-track" id="planosTrack">
                            ${drawings.map((item, idx) => `<div class="planos-slide"><img src="${item.temporaryLink}" alt="Dibujo" loading="lazy" onclick="openLightbox(${images.length + idx})"></div>`).join('')}
                        </div>
                        ${drawings.length > 1 ? `
                            <button class="slideshow-btn slideshow-prev" onclick="planosMove(-1)">&#8249;</button>
                            <button class="slideshow-btn slideshow-next" onclick="planosMove(1)">&#8250;</button>
                            <span class="slideshow-counter" id="planosCounter">1 / ${drawings.length}</span>
                        ` : ''}
                    </div>
                `;
            }

            content.innerHTML = `
                <div class="back-wrap"><a href="trabajos.html" class="back-button">&larr; volver a trabajos</a></div>
                <div class="project-slideshow">
                    <div class="slideshow-track" id="slideshowTrack">${slidesHTML}</div>
                    ${images.length > 1 ? `
                        <button class="slideshow-btn slideshow-prev" onclick="slideshowMove(-1)">&#8249;</button>
                        <button class="slideshow-btn slideshow-next" onclick="slideshowMove(1)">&#8250;</button>
                        <span class="slideshow-counter" id="slideshowCounter">1 / ${images.length}</span>
                    ` : ''}
                </div>
                <div class="project-info">
                    <aside class="project-sidebar">
                        <h1 class="project-title">${escapeHtml(currentProject.name)}</h1>
                        <div class="project-datos">${datosHTML}</div>
                    </aside>
                    <div class="project-description-wrap">
                        <div class="project-description">${descriptionHTML}</div>
                    </div>
                </div>
                ${drawingsHTML}
            `;

            slideshowIndex = 0;
            planosIndex = 0;
        }

        function slideshowMove(dir) {
            const images = currentProject.images || [];
            if (images.length < 2) return;
            slideshowIndex = (slideshowIndex + dir + images.length) % images.length;
            document.getElementById('slideshowTrack').style.transform = `translateX(-${slideshowIndex * 100}%)`;
            document.getElementById('slideshowCounter').textContent = `${slideshowIndex + 1} / ${images.length}`;
        }

        function planosMove(dir) {
            const drawings = currentProject.drawings || [];
            if (drawings.length < 2) return;
            planosIndex = (planosIndex + dir + drawings.length) % drawings.length;
            document.getElementById('planosTrack').style.transform = `translateX(-${planosIndex * 100}%)`;
            const counter = document.getElementById('planosCounter');
            if (counter) counter.textContent = `${planosIndex + 1} / ${drawings.length}`;
        }

        function openLightbox(index) {
            if (!allImages.length) return;
            currentImageIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function navigateLightbox(direction) {
            if (!allImages.length) return;
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = allImages.length - 1;
            if (currentImageIndex >= allImages.length) currentImageIndex = 0;
            updateLightbox();
        }

        function updateLightbox() {
            document.getElementById('lightboxImage').src = allImages[currentImageIndex];
            document.getElementById('lightboxCounter').textContent = `${currentImageIndex + 1} / ${allImages.length}`;
        }

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') navigateLightbox(-1);
                if (e.key === 'ArrowRight') navigateLightbox(1);
            }
        });

        const translations = {
            es: { 'nav-trabajos': 'trabajos', 'nav-sobre': 'sobre', 'nav-contacto': 'contacto' },
            en: { 'nav-trabajos': 'works', 'nav-sobre': 'about', 'nav-contacto': 'contact' },
            de: { 'nav-trabajos': 'arbeiten', 'nav-sobre': 'uber', 'nav-contacto': 'kontakt' }
        };

        function changeLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            document.querySelectorAll('.lang-option').forEach(opt => {
                opt.classList.toggle('active', opt.getAttribute('data-lang') === lang);
            });
            const t = translations[lang] || translations.es;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
        }

        window.addEventListener('load', () => {
            loadProjectData();
            changeLanguage(localStorage.getItem('selectedLanguage') || 'es');
        });
    </script>
</body>
</html>
