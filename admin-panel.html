<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Grupo Culata Jovái</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 60px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid #000000;
        }

        .admin-header h1 {
            font-size: 28px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .btn-logout {
            padding: 12px 30px;
            background-color: #000000;
            color: #FFFFFF;
            border: none;
            font-family: 'Futura', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-logout:hover {
            background-color: #DC143C;
        }

        .btn-add {
            padding: 15px 40px;
            background-color: #DC143C;
            color: #FFFFFF;
            border: none;
            font-family: 'Futura', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            margin-bottom: 40px;
            transition: background-color 0.3s ease;
        }

        .btn-add:hover {
            background-color: #000000;
        }

        .projects-admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .project-admin-card {
            border: 1px solid #000000;
            padding: 20px;
            background-color: #FFFFFF;
            cursor: move;
            transition: all 0.3s ease;
        }

        .project-admin-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .project-admin-card.drag-over {
            border-color: #DC143C;
            border-width: 2px;
        }

        .project-order-handle {
            font-size: 10px;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: right;
        }

        .project-admin-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .project-admin-card h3 {
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .project-admin-card p {
            font-size: 12px;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            color: #666;
        }

        .project-admin-actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            flex: 1;
            padding: 10px;
            border: 1px solid #000000;
            background-color: #FFFFFF;
            font-family: 'Futura', sans-serif;
            font-size: 10px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit:hover {
            background-color: #000000;
            color: #FFFFFF;
        }

        .btn-delete {
            border-color: #DC143C;
            color: #DC143C;
        }

        .btn-delete:hover {
            background-color: #DC143C;
            color: #FFFFFF;
        }

        /* MODAL FORM */
        .modal-form {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            overflow-y: auto;
        }

        .modal-form.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container {
            background-color: #FFFFFF;
            padding: 60px;
            max-width: 600px;
            width: 100%;
            position: relative;
        }

        .form-container h2 {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 300;
            margin-bottom: 40px;
            text-align: center;
        }

        .form-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .form-close:hover {
            color: #DC143C;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #000000;
            background-color: #FFFFFF;
            font-family: 'Futura', sans-serif;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #DC143C;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-save, .btn-cancel {
            flex: 1;
            padding: 15px;
            border: none;
            font-family: 'Futura', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save {
            background-color: #DC143C;
            color: #FFFFFF;
        }

        .btn-save:hover {
            background-color: #000000;
        }

        .btn-cancel {
            background-color: #FFFFFF;
            color: #000000;
            border: 1px solid #000000;
        }

        .btn-cancel:hover {
            background-color: #000000;
            color: #FFFFFF;
        }

        .image-upload-area {
            border: 2px dashed #000000;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: #FFFFFF;
        }

        .image-upload-area.drag-over {
            border-color: #DC143C;
            background-color: #fff5f5;
        }

        .image-upload-area p {
            font-size: 12px;
            letter-spacing: 1px;
            margin: 10px 0;
            color: #666;
        }

        .image-upload-area .upload-icon {
            font-size: 36px;
            color: #000000;
            margin-bottom: 10px;
        }

        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .image-preview-item {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            border: 1px solid #000000;
            overflow: hidden;
            cursor: move;
            transition: all 0.3s ease;
        }

        .image-preview-item.dragging {
            opacity: 0.5;
            transform: scale(0.9);
        }

        .image-preview-item.drag-over {
            border-color: #DC143C;
            border-width: 2px;
        }

        .image-preview-item .image-number {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #FFFFFF;
            padding: 3px 8px;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .image-preview-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 25px;
            height: 25px;
            background-color: #DC143C;
            color: #FFFFFF;
            border: none;
            cursor: pointer;
            font-size: 16px;
            line-height: 25px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .image-preview-item .remove-image:hover {
            background-color: #000000;
        }

        #imageFileInput {
            display: none;
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 80px 30px;
            }

            .form-container {
                padding: 40px 30px;
            }

            .projects-admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>PANEL DE ADMINISTRACIÓN</h1>
            <button class="btn-logout" onclick="logout()">CERRAR SESIÓN</button>
        </div>

        <button class="btn-add" onclick="openAddModal()">+ AGREGAR PROYECTO</button>

        <div class="projects-admin-grid" id="projectsAdminGrid">
            <!-- Projects will be loaded here -->
        </div>
    </div>

    <!-- MODAL FORM -->
    <div class="modal-form" id="modalForm">
        <div class="form-container">
            <span class="form-close" onclick="closeFormModal()">&times;</span>
            <h2 id="formTitle">AGREGAR PROYECTO</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                
                <div class="form-group">
                    <label for="projectTitle">TÍTULO *</label>
                    <input type="text" id="projectTitle" required>
                </div>

                <div class="form-group">
                    <label for="projectDescription">DESCRIPCIÓN *</label>
                    <textarea id="projectDescription" required></textarea>
                </div>

                <div class="form-group">
                    <label for="projectImage">IMÁGENES *</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <div class="upload-icon">📁</div>
                        <p><strong>Arrastra imágenes aquí</strong></p>
                        <p>o haz clic para seleccionar</p>
                        <p style="font-size: 10px; margin-top: 10px;">Formatos: JPG, PNG, WEBP</p>
                    </div>
                    <input type="file" id="imageFileInput" accept="image/*" multiple>
                    <div class="image-preview-grid" id="imagePreviewGrid"></div>
                    <small style="font-size: 10px; color: #666; margin-top: 15px; display: block;">Arrastra las imágenes en el preview para cambiar su orden. La primera será la imagen principal.</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">GUARDAR</button>
                    <button type="button" class="btn-cancel" onclick="closeFormModal()">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
