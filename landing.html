<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Culata Jovái Arquitectos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Futura', 'Century Gothic', sans-serif;
            background-color: #FFFFFF;
            overflow: hidden;
        }

        /* HEADER MINIMALISTA */
        .landing-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 60px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 500;
            color: #000000;
            text-transform: uppercase;
        }

        .nav-link {
            font-size: 10px;
            letter-spacing: 2px;
            color: #000000;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #DC143C;
        }

        /* CAROUSEL */
        .carousel-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .carousel-slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease;
            cursor: pointer;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* OVERLAY AL HOVER */
        .carousel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .carousel-slide:hover .carousel-overlay {
            opacity: 1;
        }

        .carousel-overlay span {
            font-size: 24px;
            letter-spacing: 4px;
            font-weight: 300;
            color: #000000;
            text-transform: uppercase;
        }

        /* NAVEGACIÓN */
        .carousel-nav {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 50;
        }

        .carousel-arrow {
            background-color: transparent;
            color: #000000;
            border: none;
            font-size: 32px;
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: 300;
        }

        .carousel-arrow:hover {
            color: #DC143C;
        }

        .carousel-dots {
            display: flex;
            gap: 12px;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            background-color: rgba(0, 0, 0, 0.3);
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .carousel-dot.active {
            background-color: #DC143C;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .landing-header {
                padding: 20px 30px;
            }

            .logo-text {
                font-size: 9px;
            }

            .nav-link {
                font-size: 8px;
            }

            .carousel-overlay span {
                font-size: 18px;
                letter-spacing: 3px;
            }

            .carousel-nav {
                bottom: 30px;
            }

            .carousel-arrow {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .landing-header {
                padding: 15px 20px;
            }

            .logo-text {
                font-size: 8px;
            }

            .carousel-overlay span {
                font-size: 16px;
                letter-spacing: 2px;
            }

            .carousel-nav {
                bottom: 20px;
                gap: 15px;
            }

            .carousel-arrow {
                font-size: 24px;
            }

            .carousel-dots {
                gap: 8px;
            }

            .carousel-dot {
                width: 6px;
                height: 6px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="landing-header">
        <div class="logo-text">Grupo Culata Jovái Arquitectos</div>
        <a href="nosotros.html" class="nav-link">Nosotros</a>
    </header>

    <!-- CAROUSEL -->
    <div class="carousel-container" id="carouselContainer">
        <!-- Slides se generarán dinámicamente -->
    </div>

    <!-- NAVEGACIÓN -->
    <div class="carousel-nav">
        <button class="carousel-arrow" id="prevBtn">‹</button>
        <div class="carousel-dots" id="dotsContainer"></div>
        <button class="carousel-arrow" id="nextBtn">›</button>
    </div>

    <script>
        // Obtener las primeras 10 imágenes de los proyectos
        function getCarouselImages() {
            const projects = localStorage.getItem('projects');
            if (!projects) {
                // Imágenes por defecto si no hay proyectos en localStorage
                return [
                    'images/casa1.jpg',
                    'images/casa2.jpg',
                    'images/casa3.jpg',
                    'images/casa4.jpg',
                    'images/casa5.jpg',
                    'images/casa6.jpg',
                    'images/casa7.jpg',
                    'images/casa8.jpg',
                    'images/casa9.jpg'
                ];
            }

            const projectsArray = JSON.parse(projects);
            const images = [];

            // Obtener primera imagen de cada proyecto (máximo 10)
            for (let i = 0; i < Math.min(projectsArray.length, 10); i++) {
                const project = projectsArray[i];
                if (project.images && project.images.length > 0) {
                    images.push(project.images[0]);
                } else if (project.image) {
                    images.push(project.image);
                }
            }

            return images.slice(0, 10); // Máximo 10 imágenes
        }

        // Crear slides del carousel
        function createCarousel() {
            const images = getCarouselImages();
            const container = document.getElementById('carouselContainer');
            const dotsContainer = document.getElementById('dotsContainer');

            images.forEach((imgSrc, index) => {
                // Crear slide
                const slide = document.createElement('div');
                slide.className = 'carousel-slide' + (index === 0 ? ' active' : '');
                slide.innerHTML = `
                    <img src="${imgSrc}" alt="Proyecto ${index + 1}">
                    <div class="carousel-overlay">
                        <span>Más Proyectos</span>
                    </div>
                `;
                slide.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
                container.appendChild(slide);

                // Crear dot
                const dot = document.createElement('button');
                dot.className = 'carousel-dot' + (index === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(index));
                dotsContainer.appendChild(dot);
            });
        }

        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');

        function showSlide(index) {
            // Eliminar active de todos
            document.querySelectorAll('.carousel-slide').forEach(slide => {
                slide.classList.remove('active');
            });
            document.querySelectorAll('.carousel-dot').forEach(dot => {
                dot.classList.remove('active');
            });

            // Añadir active al actual
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            
            if (slides[index]) slides[index].classList.add('active');
            if (dots[index]) dots[index].classList.add('active');
        }

        function nextSlide() {
            const totalSlides = document.querySelectorAll('.carousel-slide').length;
            currentSlide = (currentSlide + 1) % totalSlides;
            showSlide(currentSlide);
        }

        function prevSlide() {
            const totalSlides = document.querySelectorAll('.carousel-slide').length;
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            showSlide(currentSlide);
        }

        function goToSlide(index) {
            currentSlide = index;
            showSlide(currentSlide);
        }

        // Event listeners
        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);

        // Navegación con teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Auto-avance cada 5 segundos
        let autoSlide = setInterval(nextSlide, 5000);

        // Pausar auto-avance al hover
        document.getElementById('carouselContainer').addEventListener('mouseenter', () => {
            clearInterval(autoSlide);
        });

        document.getElementById('carouselContainer').addEventListener('mouseleave', () => {
            autoSlide = setInterval(nextSlide, 5000);
        });

        // Inicializar carousel
        createCarousel();
    </script>
</body>
</html>
