<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - Grupo Culata Jovái</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #FFFFFF;
        }

        .login-box {
            width: 100%;
            max-width: 450px;
            padding: 60px;
            border: 1px solid #000000;
        }

        .login-box h2 {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 300;
            margin-bottom: 50px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #000000;
            background-color: #FFFFFF;
            font-family: 'Futura', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #DC143C;
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background-color: #000000;
            color: #FFFFFF;
            border: none;
            font-family: 'Futura', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        .btn-login:hover {
            background-color: #DC143C;
        }

        .error-message {
            color: #DC143C;
            font-size: 12px;
            letter-spacing: 1px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #000000;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #DC143C;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>ADMINISTRADOR</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">USUARIO</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">CONTRASEÑA</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-login">INGRESAR</button>
                <div class="error-message" id="errorMessage">Usuario o contraseña incorrectos</div>
            </form>
            <div class="back-link">
                <a href="index.html">← VOLVER AL SITIO</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // Sistema de autenticación con Firebase Authentication
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Construir email a partir del username
            const email = username + '@culatajovai.admin';
            
            try {
                // Intentar iniciar sesión con Firebase Auth
                await firebase.auth().signInWithEmailAndPassword(email, password);
                
                // Guardar sesión
                sessionStorage.setItem('adminLoggedIn', 'true');
                
                // Redirigir al panel
                window.location.href = 'admin-panel.html';
            } catch (error) {
                console.error('Error de autenticación:', error);
                errorMessage.textContent = 'Usuario o contraseña incorrectos';
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        });
    </script>
</body>
</html>
