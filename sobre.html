<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre - Grupo Culata Jovái Arquitectos</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* HEADER MINIMALISTA */
        .landing-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 60px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #FFFFFF;
        }

        .logo-text {
            cursor: pointer;
            height: 35px;
            display: flex;
            align-items: center;
        }

        .logo-text img {
            height: 100%;
            width: auto;
            transition: opacity 0.3s ease;
        }

        .logo-text:hover img {
            opacity: 0.7;
        }

        .nav-link {
            font-size: 10px;
            letter-spacing: 2px;
            color: #000000;
            text-decoration: none;
            text-transform: lowercase;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #DC143C;
        }

        /* SELECTOR DE IDIOMA */
        .language-selector {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            display: flex;
            gap: 10px;
        }

        .lang-option {
            font-size: 10px;
            letter-spacing: 1px;
            color: #999999;
            text-decoration: none;
            text-transform: lowercase;
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .lang-option:hover {
            color: #000000;
        }

        .lang-option.active {
            color: #000000;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .landing-header {
                padding: 20px 30px;
            }

            .logo-text {
                height: 28px;
            }

            .nav-link {
                font-size: 8px;
            }

            .language-selector {
                bottom: 20px;
                right: 20px;
                gap: 8px;
            }

            .lang-option {
                font-size: 9px;
            }
        }

        @media (max-width: 480px) {
            .landing-header {
                padding: 15px 20px;
            }

            .logo-text {
                height: 24px;
            }
        }
    </style>
    <style>
        /* ESTILOS ESPECÍFICOS PARA SOBRE */
        #nosotros {
            background-color: #FFFFFF;
            padding: 140px 60px 100px;
            min-height: 100vh;
        }

        .nosotros-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .nosotros-title {
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 80px;
            text-align: center;
        }

        .about-stack {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .about-block {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .about-block.text p {
            width: 100%;
            font-size: 15px;
            line-height: 1.9;
            letter-spacing: 0.4px;
            margin: 0;
            font-weight: 300;
            text-align: center;
        }

        .about-block.image img {
            width: min(420px, 100%);
            height: auto;
            max-height: 520px;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            #nosotros {
                padding: 100px 30px 80px;
            }

            .about-stack {
                gap: 22px;
            }

            .about-block.image img {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            #nosotros {
                padding: 80px 20px 60px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="landing-header">
        <nav style="display: flex; gap: 30px;">
            <a href="trabajos.html" class="nav-link" data-i18n="nav-trabajos">trabajos</a>
            <a href="sobre.html" class="nav-link" data-i18n="nav-sobre">sobre</a>
            <a href="contacto.html" class="nav-link" data-i18n="nav-contacto">contacto</a>
        </nav>
        <div class="logo-text" onclick="window.location.href='index.html'">
            <img src="images/logo.png" alt="Grupo Culata Jovái Arquitectos">
        </div>
    </header>

    <!-- NOSOTROS -->
    <section id="nosotros">
        <div class="nosotros-container">
            <h2 class="nosotros-title" data-i18n="about-title">Sobre</h2>
            <div id="personCards" class="about-stack">
                <!-- Se llena dinámicamente desde Dropbox -->
            </div>
        </div>
    </section>

    <!-- SELECTOR DE IDIOMA -->
    <div class="language-selector">
        <span class="lang-option active" data-lang="es" onclick="changeLanguage('es')">es</span>
        <span class="lang-option" data-lang="en" onclick="changeLanguage('en')">en</span>
        <span class="lang-option" data-lang="de" onclick="changeLanguage('de')">de</span>
    </div>

    <script src="dropbox-config.js"></script>
    <script src="dropbox-service-vercel.js"></script>
    <script>
        let sobreImages = [];

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }

        function parseStructuredBlocks(text) {
            const lines = (text || '').split(/\r?\n/).map(line => line.trim()).filter(Boolean);
            const blocks = [];

            for (const line of lines) {
                if (/^image\s*:/i.test(line)) {
                    const value = line.replace(/^image\s*:/i, '').trim();
                    if (value) blocks.push({ type: 'image', value });
                } else if (/^text\s*:/i.test(line)) {
                    const value = line.replace(/^text\s*:/i, '').trim();
                    if (value) blocks.push({ type: 'text', value });
                }
            }

            return blocks;
        }

        function renderStructuredBlocks(container, blocks) {
            const imageByName = new Map(
                (sobreImages || []).map(item => [String(item.name || '').toLowerCase(), item])
            );

            container.innerHTML = blocks.map(block => {
                if (block.type === 'image') {
                    const img = imageByName.get(String(block.value || '').toLowerCase());
                    if (!img) return '';
                    return `<div class="about-block image"><img src="${img.temporaryLink}" alt="${esc(img.name)}"></div>`;
                }

                return `<div class="about-block text"><p>${esc(block.value)}</p></div>`;
            }).join('');
        }

        async function loadSobreContent(lang) {
            const container = document.getElementById('personCards');
            if (!container) return;

            try {
                const langKey = lang === 'en' ? 'sobre_en' : lang === 'de' ? 'sobre_de' : 'sobre_es';
                let text = null;
                try { text = await dropboxService.getSiteContent(langKey); } catch (_) {}
                if (!text || !text.trim()) {
                    try { text = await dropboxService.getSiteContent('sobre'); } catch (_) {}
                }

                const structuredBlocks = parseStructuredBlocks(text || '');
                if (structuredBlocks.length) {
                    renderStructuredBlocks(container, structuredBlocks);
                    return;
                }

                const paragraphs = text
                    ? text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean)
                    : [];

                if (!paragraphs.length) {
                    container.innerHTML = '';
                    return;
                }

                container.innerHTML = paragraphs.map((bio, i) => {
                    const img = sobreImages[i];
                    const photoHtml = img
                        ? `<div class="about-block image"><img src="${img.temporaryLink}" alt=""></div>`
                        : '';
                    const textHtml = bio.split(/\n/).map(line => `<div class="about-block text"><p>${esc(line)}</p></div>`).join('');
                    return `${photoHtml}${textHtml}`;
                }).join('');
            } catch (error) {
                console.error('No se pudo cargar el contenido de Sobre:', error);
            }
        }

        // Sistema de traducción
        const translations = {
            es: {
                'nav-trabajos': 'trabajos',
                'nav-sobre': 'sobre',
                'nav-contacto': 'contacto',
                'about-title': 'Sobre'
            },
            en: {
                'nav-trabajos': 'works',
                'nav-sobre': 'about',
                'nav-contacto': 'contact',
                'about-title': 'About'
            },
            de: {
                'nav-trabajos': 'arbeiten',
                'nav-sobre': 'über',
                'nav-contacto': 'kontakt',
                'about-title': 'Über'
            }
        };

        // Función para cambiar idioma
        function changeLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            updateLanguageUI(lang);
            applyTranslations(lang);
            loadSobreContent(lang);
        }

        // Actualizar indicador visual del idioma seleccionado
        function updateLanguageUI(lang) {
            document.querySelectorAll('.lang-option').forEach(option => {
                option.classList.remove('active');
                if (option.dataset.lang === lang) {
                    option.classList.add('active');
                }
            });
        }

        // Aplicar traducciones a todos los elementos con data-i18n
        function applyTranslations(lang) {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.dataset.i18n;
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
        }

        // Inicializar idioma al cargar la página
        function initLanguage() {
            const savedLang = localStorage.getItem('selectedLanguage') || 'es';
            updateLanguageUI(savedLang);
            applyTranslations(savedLang);
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            initLanguage();
            const lang = localStorage.getItem('selectedLanguage') || 'es';
            try { sobreImages = await dropboxService.getSobreImages(); } catch (_) {}
            loadSobreContent(lang);
        });
    </script>
</body>
</html>
