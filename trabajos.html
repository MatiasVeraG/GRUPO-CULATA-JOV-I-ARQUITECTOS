<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Culata Jovái Arquitectos</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* HEADER MINIMALISTA */
        .landing-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 60px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #FFFFFF;
        }

        .logo-text {
            cursor: pointer;
            height: 35px;
            display: flex;
            align-items: center;
        }

        .logo-text img {
            height: 100%;
            width: auto;
            transition: opacity 0.3s ease;
        }

        .logo-text:hover img {
            opacity: 0.7;
        }

        .nav-link {
            font-size: 10px;
            letter-spacing: 2px;
            color: #000000;
            text-decoration: none;
            text-transform: lowercase;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #DC143C;
        }

        /* SELECTOR DE IDIOMA */
        .language-selector {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            display: flex;
            gap: 10px;
        }

        .lang-option {
            font-size: 10px;
            letter-spacing: 1px;
            color: #999999;
            text-decoration: none;
            text-transform: lowercase;
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .lang-option:hover {
            color: #000000;
        }

        .lang-option.active {
            color: #000000;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .landing-header {
                padding: 20px 30px;
            }

            .logo-text {
                height: 28px;
            }

            .nav-link {
                font-size: 8px;
            }

            .language-selector {
                bottom: 20px;
                right: 20px;
                gap: 8px;
            }

            .lang-option {
                font-size: 9px;
            }
        }

        @media (max-width: 480px) {
            .landing-header {
                padding: 15px 20px;
            }

            .logo-text {
                height: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="landing-header">
        <nav style="display: flex; gap: 30px;">
            <a href="trabajos.html" class="nav-link" data-i18n="nav-trabajos">trabajos</a>
            <a href="nosotros.html" class="nav-link" data-i18n="nav-sobre">sobre</a>
            <a href="contacto.html" class="nav-link" data-i18n="nav-contacto">contacto</a>
        </nav>
        <div class="logo-text" onclick="window.location.href='index.html'">
            <img src="images/logo.png" alt="Grupo Culata Jovái Arquitectos">
        </div>
    </header>

    <!-- PROYECTOS -->
    <section id="proyectos">
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects will be loaded dynamically -->
        </div>
    </section>

    <!-- MODAL PROYECTO -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="">
                    <button class="modal-prev" id="modalPrev">‹</button>
                    <button class="modal-next" id="modalNext">›</button>
                    <div class="modal-indicators" id="modalIndicators"></div>
                </div>
                <div class="modal-info">
                    <h3 id="modalTitle"></h3>
                    <p id="modalDescription"></p>
                    <span class="modal-counter" id="modalCounter">1 / 1</span>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 GRUPO CULATA JOVÁI ARQUITECTOS</p>
        <p style="margin-top: 10px; font-size: 9px;"><a href="admin.html" style="color: #FFFFFF; text-decoration: none; opacity: 0.5;">ADMIN</a></p>
    </footer>
    <!-- SELECTOR DE IDIOMA -->
    <div class="language-selector">
        <span class="lang-option active" data-lang="es" onclick="changeLanguage('es')">es</span>
        <span class="lang-option" data-lang="en" onclick="changeLanguage('en')">en</span>
        <span class="lang-option" data-lang="de" onclick="changeLanguage('de')">de</span>
    </div>

    <script>
        // Sistema de traducción
        const translations = {
            es: {
                'nav-trabajos': 'trabajos',
                'nav-sobre': 'sobre',
                'nav-contacto': 'contacto'
            },
            en: {
                'nav-trabajos': 'works',
                'nav-sobre': 'about',
                'nav-contacto': 'contact'
            },
            de: {
                'nav-trabajos': 'arbeiten',
                'nav-sobre': 'über',
                'nav-contacto': 'kontakt'
            }
        };

        // Función para cambiar idioma
        function changeLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            updateLanguageUI(lang);
            applyTranslations(lang);
        }

        // Actualizar indicador visual del idioma seleccionado
        function updateLanguageUI(lang) {
            document.querySelectorAll('.lang-option').forEach(option => {
                option.classList.remove('active');
                if (option.dataset.lang === lang) {
                    option.classList.add('active');
                }
            });
        }

        // Aplicar traducciones a todos los elementos con data-i18n
        function applyTranslations(lang) {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.dataset.i18n;
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
        }

        // Inicializar idioma al cargar la página
        function initLanguage() {
            const savedLang = localStorage.getItem('selectedLanguage') || 'es';
            updateLanguageUI(savedLang);
            applyTranslations(savedLang);
        }

        // Inicializar idioma
        initLanguage();
    </script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
