<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dropbox - Grupo Culata Jovai</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { max-width: 1440px; margin: 0 auto; padding: 36px 28px; }
        .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; border-bottom:1px solid #eee; padding-bottom:16px; }
        .admin-header h1 { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; font-weight: 400; }
        .status { font-size: 11px; letter-spacing: 1px; color:#666; }

        .layout { display:grid; grid-template-columns: 320px 1fr; gap: 22px; }
        .panel { border:1px solid #ececec; background:#fff; }
        .panel-title { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 16px; border-bottom:1px solid #ececec; }

        .projects-list { max-height: 72vh; overflow: auto; }
        .project-item { padding: 12px 16px; border-bottom:1px solid #f2f2f2; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
        .project-item:hover { background:#fafafa; }
        .project-item.active { background:#000; color:#fff; }
        .project-item small { color:#999; }
        .project-item.active small { color:#ccc; }

        .content { padding: 16px; }
        .row { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .box { border:1px solid #efefef; padding: 14px; }
        .box h3 { margin:0 0 10px; font-size:11px; letter-spacing:2px; text-transform:uppercase; }

        textarea, input[type="text"], select { width:100%; border:1px solid #ddd; padding:10px; font-family:inherit; font-size:13px; }
        textarea { min-height: 180px; resize: vertical; line-height: 1.5; }

        .features-list { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
        .feature-row { display:grid; grid-template-columns: 1fr 1fr auto; gap:8px; }

        .actions { display:flex; gap:8px; flex-wrap: wrap; margin-top: 10px; }
        .btn { border:none; padding:10px 14px; font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
        .btn-primary { background:#000; color:#fff; }
        .btn-danger { background:#DC143C; color:#fff; }
        .btn-light { background:#f3f3f3; color:#333; }

        .upload-row { display:grid; grid-template-columns: 160px 1fr auto; gap:8px; align-items:center; margin:12px 0; }
        .help { font-size: 11px; color:#777; }

        .media-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-top:12px; }
        .media-item { border:1px solid #eee; position: relative; }
        .media-item img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
        .media-item button { position:absolute; top:6px; right:6px; border:none; background:rgba(220,20,60,.95); color:#fff; cursor:pointer; padding:4px 6px; font-size:10px; }

        .new-project { display:flex; gap:8px; padding:12px 16px; border-bottom:1px solid #eee; }
        .site-content-box { border:1px solid #efefef; padding:14px; margin-bottom:16px; }
        .site-content-box h3 { margin:0 0 10px; font-size:11px; letter-spacing:2px; text-transform:uppercase; }

        @media (max-width: 980px) {
            .layout { grid-template-columns: 1fr; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Administrador Dropbox</h1>
            <div class="status" id="statusText">Conectando...</div>
        </div>

        <div class="layout">
            <aside class="panel">
                <div class="panel-title">Proyectos</div>
                <div class="new-project">
                    <input id="newProjectName" type="text" placeholder="Nuevo proyecto">
                    <button class="btn btn-primary" onclick="createProject()">Crear</button>
                </div>
                <div id="projectsList" class="projects-list"></div>
            </aside>

            <section class="panel">
                <div class="panel-title" id="editorTitle">Selecciona un proyecto</div>
                <div class="content" id="editorContent">
                    <div class="site-content-box">
                        <h3>Contenido Del Sitio</h3>
                        <p class="help">Edita aquí los textos globales de Sobre y Contacto (guardados en Dropbox).</p>

                        <div class="row" style="margin-top:10px;">
                            <div>
                                <label style="font-size:10px;letter-spacing:1px;color:#666;text-transform:uppercase;">Sobre</label>
                                <textarea id="siteSobreText" placeholder="Texto de la página Sobre..."></textarea>
                                <div class="actions">
                                    <button class="btn btn-primary" onclick="saveSiteText('sobre')">Guardar Sobre</button>
                                </div>
                            </div>
                            <div>
                                <label style="font-size:10px;letter-spacing:1px;color:#666;text-transform:uppercase;">Contacto</label>
                                <textarea id="siteContactoText" placeholder="Texto de la página Contacto..."></textarea>
                                <div class="actions">
                                    <button class="btn btn-primary" onclick="saveSiteText('contacto')">Guardar Contacto</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <p class="help">Elige un proyecto de la lista para editar Descripcion, Caracteristicas, Imagenes y Dibujos.</p>
                </div>
            </section>
        </div>
    </div>

    <script src="dropbox-config.js"></script>
    <script src="dropbox-service-vercel.js"></script>
    <script>
        let projects = [];
        let selectedProjectPath = null;
        let selectedDetail = null;

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }

        function setStatus(text, isError = false) {
            const el = document.getElementById('statusText');
            el.textContent = text;
            el.style.color = isError ? '#DC143C' : '#666';
        }

        function featureRowsHtml(features) {
            const rows = (features && features.length ? features : [{ key: '', value: '' }]);
            return rows.map((item, index) => `
                <div class="feature-row" data-row="${index}">
                    <input type="text" placeholder="Clave (Ej: Ubicacion)" value="${esc(item.key)}">
                    <input type="text" placeholder="Valor (Ej: Asuncion, Paraguay)" value="${esc(item.value)}">
                    <button class="btn btn-light" onclick="removeFeatureRow(${index})">X</button>
                </div>
            `).join('');
        }

        function renderEditor(detail) {
            const content = document.getElementById('editorContent');
            const title = document.getElementById('editorTitle');
            title.textContent = `Editando: ${detail.name}`;

            content.innerHTML = `
                <div class="row">
                    <div class="box">
                        <h3>Descripcion</h3>
                        <textarea id="descriptionText" placeholder="Narracion del proyecto...">${esc(detail.description || '')}</textarea>
                        <div class="actions">
                            <button class="btn btn-primary" onclick="saveDescription()">Guardar descripcion</button>
                        </div>
                    </div>

                    <div class="box">
                        <h3>Caracteristicas</h3>
                        <div id="featuresList" class="features-list">${featureRowsHtml(detail.features || [])}</div>
                        <div class="actions">
                            <button class="btn btn-light" onclick="addFeatureRow()">Agregar fila</button>
                            <button class="btn btn-primary" onclick="saveFeatures()">Guardar caracteristicas</button>
                        </div>
                    </div>
                </div>

                <div class="box" style="margin-top:16px;">
                    <h3>Subir Archivos</h3>
                    <div class="upload-row">
                        <select id="uploadType">
                            <option value="Imagenes">Imagenes</option>
                            <option value="Dibujos">Dibujos</option>
                        </select>
                        <input id="uploadFiles" type="file" accept=".jpg,.jpeg,.png,.webp" multiple>
                        <button class="btn btn-primary" onclick="uploadFiles()">Subir</button>
                    </div>
                    <p class="help">Solo JPG/PNG/WebP. Maximo 10MB por archivo.</p>
                </div>

                <div class="row" style="margin-top:16px;">
                    <div class="box">
                        <h3>Imagenes</h3>
                        <div class="media-grid">
                            ${detail.images.map(item => `<div class="media-item"><img src="${item.temporaryLink}" alt="${esc(item.name)}"><button onclick="deleteMedia('${encodeURIComponent(item.path)}')">Eliminar</button></div>`).join('') || '<p class="help">Sin imagenes.</p>'}
                        </div>
                    </div>
                    <div class="box">
                        <h3>Dibujos</h3>
                        <div class="media-grid">
                            ${detail.drawings.map(item => `<div class="media-item"><img src="${item.temporaryLink}" alt="${esc(item.name)}"><button onclick="deleteMedia('${encodeURIComponent(item.path)}')">Eliminar</button></div>`).join('') || '<p class="help">Sin dibujos.</p>'}
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadProjects() {
            setStatus('Cargando proyectos...');
            const list = document.getElementById('projectsList');
            list.innerHTML = '<div style="padding:12px 16px;color:#777;">Cargando...</div>';
            try {
                projects = await dropboxService.listProjects();
                if (!projects.length) {
                    list.innerHTML = '<div style="padding:12px 16px;color:#777;">Sin proyectos</div>';
                    setStatus('Sin proyectos');
                    return;
                }
                list.innerHTML = projects.map(project => `
                    <div class="project-item ${selectedProjectPath === project.path ? 'active' : ''}" onclick="selectProject('${encodeURIComponent(project.path)}')">
                        <span>${esc(project.name)}</span>
                        <small>${esc(project.slug)}</small>
                    </div>
                `).join('');
                setStatus('Conectado a Dropbox');
            } catch (error) {
                console.error(error);
                list.innerHTML = `<div style="padding:12px 16px;color:#DC143C;">Error: ${esc(error.message)}</div>`;
                setStatus('Error de conexion', true);
            }
        }

        async function selectProject(encodedPath) {
            selectedProjectPath = decodeURIComponent(encodedPath);
            await loadProjects();
            await refreshDetail();
        }

        async function refreshDetail() {
            if (!selectedProjectPath) return;
            setStatus('Cargando detalle del proyecto...');
            selectedDetail = await dropboxService.getProjectDetail(selectedProjectPath);
            renderEditor(selectedDetail);
            setStatus('Conectado a Dropbox');
        }

        function collectFeaturesRows() {
            const container = document.getElementById('featuresList');
            const rows = Array.from(container.querySelectorAll('.feature-row'));
            return rows.map(row => {
                const inputs = row.querySelectorAll('input');
                return {
                    key: (inputs[0].value || '').trim(),
                    value: (inputs[1].value || '').trim()
                };
            }).filter(item => item.key || item.value);
        }

        function addFeatureRow() {
            const container = document.getElementById('featuresList');
            const row = document.createElement('div');
            row.className = 'feature-row';
            row.innerHTML = `
                <input type="text" placeholder="Clave (Ej: Ubicacion)">
                <input type="text" placeholder="Valor (Ej: Asuncion, Paraguay)">
                <button class="btn btn-light" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        function removeFeatureRow(index) {
            const rows = document.querySelectorAll('#featuresList .feature-row');
            if (rows[index]) rows[index].remove();
        }

        async function saveDescription() {
            if (!selectedProjectPath) return;
            const content = document.getElementById('descriptionText').value;
            setStatus('Guardando descripcion...');
            await dropboxService.saveDescription(selectedProjectPath, content);
            setStatus('Descripcion guardada');
            await refreshDetail();
        }

        async function saveFeatures() {
            if (!selectedProjectPath) return;
            const rows = collectFeaturesRows();
            const text = rows.map(item => `${item.key}: ${item.value}`).join('\n');
            setStatus('Guardando caracteristicas...');
            await dropboxService.saveFeatures(selectedProjectPath, text);
            setStatus('Caracteristicas guardadas');
            await refreshDetail();
        }

        async function uploadFiles() {
            if (!selectedProjectPath) return;
            const input = document.getElementById('uploadFiles');
            const type = document.getElementById('uploadType').value;
            const files = Array.from(input.files || []);
            if (!files.length) {
                setStatus('Selecciona archivos para subir', true);
                return;
            }
            setStatus(`Subiendo ${files.length} archivo(s)...`);
            for (const file of files) {
                const destinationPath = `${selectedProjectPath}/${type}/${file.name}`;
                await dropboxService.uploadFile(file, destinationPath);
            }
            input.value = '';
            setStatus('Archivos subidos');
            await refreshDetail();
        }

        async function deleteMedia(encodedPath) {
            const path = decodeURIComponent(encodedPath);
            if (!confirm('Eliminar este archivo de Dropbox?')) return;
            setStatus('Eliminando archivo...');
            await dropboxService.deleteFile(path);
            setStatus('Archivo eliminado');
            await refreshDetail();
        }

        async function createProject() {
            const input = document.getElementById('newProjectName');
            const name = (input.value || '').trim();
            if (!name) {
                setStatus('Ingresa nombre del proyecto', true);
                return;
            }
            setStatus('Creando proyecto...');
            await dropboxService.createProject(name);
            input.value = '';
            setStatus('Proyecto creado');
            await loadProjects();
        }

        async function loadSiteContentEditors() {
            try {
                const [sobre, contacto] = await Promise.all([
                    dropboxService.getSiteContent('sobre'),
                    dropboxService.getSiteContent('contacto')
                ]);

                const sobreEl = document.getElementById('siteSobreText');
                const contactoEl = document.getElementById('siteContactoText');
                if (sobreEl) sobreEl.value = sobre || '';
                if (contactoEl) contactoEl.value = contacto || '';
            } catch (error) {
                console.error(error);
                setStatus('No se pudieron cargar Sobre/Contacto', true);
            }
        }

        async function saveSiteText(pageKey) {
            const fieldId = pageKey === 'sobre' ? 'siteSobreText' : 'siteContactoText';
            const field = document.getElementById(fieldId);
            if (!field) return;

            setStatus(`Guardando ${pageKey}...`);
            try {
                await dropboxService.saveSiteContent(pageKey, field.value || '');
                setStatus(`${pageKey} guardado`);
            } catch (error) {
                console.error(error);
                setStatus(`Error guardando ${pageKey}`, true);
            }
        }

        window.addEventListener('load', async () => {
            try {
                await Promise.all([loadProjects(), loadSiteContentEditors()]);
            } catch (error) {
                console.error(error);
                setStatus(error.message, true);
            }
        });
    </script>
</body>
</html>
